apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    component: rabbitmq
    project: roboshop
    env: dev 
    tier: database
type: opaque 
data:
  RABBITMQ_DEFAULT_USER: "cm9ib3Nob3A="
  RABBITMQ_DEFAULT_PASS: "cm9ib3Nob3AxMjM="
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: rabbitmq
    env: dev
    tier: database
  ports:
  - protocol: TCP
    port: 5672
    targetPort: 5672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-normal-service
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
spec:
  selector:
    project: roboshop
    component: rabbitmq
    env: dev
    tier: database
  ports:
  - protocol: TCP
    port: 5672
    targetPort: 5672
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  labels:
    project: roboshop
    component: rabbitmq
    env: dev
    tier: database
spec:
  replicas: 1
  serviceName: rabbitmq 
  selector:
    matchLabels:
      project: roboshop
      component: rabbitmq
      env: dev
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: rabbitmq
        env: dev
        tier: database
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: rabbitmq
        volumeMounts:
        - name: rabbitmq-storage
          mountPath: /var/lib/rabbitmq 
  volumeClaimTemplates:
  - metadata:
      name: rabbitmq-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: roboshop-ebs-sc
      resources:
        requests:
          storage: 4Gi