apiVersion: v1
kind: Service
metadata:
  name: mongodb-normal-service
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
spec:
  selector:
    project: roboshop
    component: catalogue
    env: dev
    tier: database
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27107

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
spec:
  selector:
    project: roboshop
    component: mongodb
    env: dev
    tier: database
  clusterIP: None
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
  
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    env: dev
    tier: database
spec:
  replicas: 3
  serviceName: mongodb
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      env: dev
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        env: dev
        tier: database
    spec:
      containers:
      - name: mongodb
        image: shanmukhatadisetti/mongodb:v1
        imagePullPolicy: Always
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: roboshop-ebs-sc
      resources:
        requests:
          storage: 4Gi
      
