apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  labels:
    component: user
    project: roboshop
    env: dev
    tier: app
data:
  MONGO: "true" 
  REDIS_URL: "redis://redis:6379" 
  MONGO_URL: "mongodb://mongodb:27017/users"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  labels:
    project: roboshop
    component: user
    env: dev
    tier: app
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: user
      env: dev
      tier: app
  template:
    metadata:
      labels:
        project: roboshop
        component: user
        env: dev
        tier: app
    spec:
      containers:
      - name: user
        image: shanmukhatadisetti/user:v1
        envFrom:
        - configMapRef:
            name: user
---
apiVersion: v1
kind: Service
metadata:
  name: user
  labels: 
    project: roboshop
    env: dev
spec:
  selector:
    project: roboshop
    component: user
    env: dev
    tier: app
  ports:
  - protocol:
    port: 8080
    targetPort: 8080