apiVersion: v1
kind: Service
metadata:
  name: redis-normal-service
  labels:
    project: roboshop
    env: dev
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: redis
    env: dev 
    tier: database
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata: 
  name: redis
  namespace: roboshop 
  labels:
    project: roboshop
    env: dev
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: redis
    env: dev
    tier: database
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    project: roboshop
    component: redis
    env: dev
    tier: database
  namespace: roboshop
spec:
  replicas: 1
  serviceName: redis
  selector:
    matchLabels:
      project: roboshop
      component: redis
      env: dev
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: redis
        env: dev
        tier: database
    spec: 
      containers:
      - name: redis
        image: redis:7.0
        volumeMounts:
        - name: redis-storage
          mountPath: /db
  volumeClaimTemplates:
  - metadata:
      name: redis-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: roboshop-ebs-sc
      resources:
        requests:
          storage: 4Gi