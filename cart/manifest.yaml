apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
  labels:
    component: cart
    project: roboshop
    env: dev
    tier: app
data:
  REDIS_HOST: "redis" 
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: cart
  namespace: roboshop 
  labels:
    component: cart
    project: roboshop
    env: dev
    tier: app
spec:
  replicas: 3
  selector:
    matchLabels:
      component: cart
      project: roboshop
      env: dev
      tier: app
  template:
    metadata:
      labels:
        component: cart
        project: roboshop
        env: dev
        tier: app
    spec:
      containers:
        - name: cart
          image: shanmukhatadisetti/cart:v1
          envFrom:
          - configMapRef:
              name: cart
          resources:
            requests:
              cpu: "128m"
              memory: "100Mi"
            limits:
              cpu: "256m"
              memory: "200Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels: 
    component: cart
    project: roboshop
    env: dev
    tier: app
spec:
  selector:
    component: cart
    project: roboshop
    env: dev
    tier: app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cart
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60